version: '3.8'

services:
  db:
    image: postgres:16
    container_name: rukospace_db
    environment:
      POSTGRES_USER: rukospace
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rukospace_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rukospace_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=rukospace
      - DB_PASSWORD=password
      - DB_NAME=rukospace_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rukospace_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
